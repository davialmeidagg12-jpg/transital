<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emergência Transital PRO</title>
    <!-- Biblioteca do Scanner -->
    <script src="https://unpkg.com"></script>
    <style>
        :root { 
            --amarelo: #ffcc00; --vermelho: #d90429; --verde: #2ecc71; 
            --fundo: #121212; --card: #1e1e1e; --texto: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); color: var(--texto); margin: 0; padding-bottom: 100px; overflow: hidden; height: 100vh; }
        
        header { background: var(--amarelo); color: #000; padding: 15px; text-align: center; font-weight: 900; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000; position: relative; }

        .content { height: calc(100vh - 140px); overflow-y: auto; }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; box-sizing: border-box; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* BOTÕES PADRONIZADOS */
        .btn-base { 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            border: none; border-radius: 20px; font-weight: 700; color: white; 
            text-decoration: none; width: 100%; box-sizing: border-box;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4); cursor: pointer; transition: 0.2s;
            margin-bottom: 15px;
        }
        .btn-base:active { transform: scale(0.98); }
        .btn-inicio { padding: 20px 10px; font-size: 12px; flex-direction: column; margin-bottom: 0; }
        .btn-idoso { padding: 40px 20px; font-size: 24px; }

        /* Cores */
        .bg-vermelho { background: var(--vermelho); }
        .bg-verde { background: var(--verde); }
        .bg-azul { background: #3498db; }
        .bg-rosa { background: #e91e63; }
        .bg-roxo { background: #9b59b6; }

        /* Scanner */
        #reader { width: 100% !important; border-radius: 20px; overflow: hidden; border: 2px solid var(--amarelo); }

        /* MENU INFERIOR (5 ÍCONES) */
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 1000; }
        nav button { background: none; border: none; color: #666; font-size: 9px; display: flex; flex-direction: column; align-items: center; outline: none; flex: 1; }
        nav button.active-nav { color: var(--amarelo); }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }

        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <header>EMERGÊNCIA TRANSITAL PRO</header>

    <div class="content">
        <!-- PÁGINA 1: INÍCIO -->
        <div id="home" class="page active">
            <h3 style="text-align:center; margin-bottom: 15px;">Painel de Controle</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <a href="tel:191" class="btn-base btn-inicio bg-vermelho"><span>🚨</span> POLÍCIA</a>
                <a href="tel:193" class="btn-base btn-inicio bg-vermelho" style="background:#b91c1c;"><span>🚑</span> BOMBEIROS</a>
                <button onclick="enviarZap()" class="btn-base btn-inicio bg-verde"><span>📍</span> MANDAR ZAP</button>
                <button onclick="showPage('camera', document.getElementById('nav-camera'))" class="btn-base btn-inicio bg-roxo"><span>📷</span> LER PLACA</button>
            </div>
            <button onclick="showPage('mapa', document.getElementById('nav-mapa'))" class="btn-base bg-azul" style="margin-top: 15px; padding: 15px;">🗺️ VER MAPA E TRÂNSITO</button>
        </div>

        <!-- PÁGINA 2: IDOSO -->
        <div id="idoso" class="page">
            <a href="tel:191" class="btn-base btn-idoso bg-vermelho">📞 POLÍCIA</a>
            <button onclick="ligarFamilia()" class="btn-base btn-idoso bg-rosa">❤️ FAMÍLIA</button>
            <button onclick="enviarZap()" class="btn-base btn-idoso bg-verde">🟢 MANDAR ZAP</button>
        </div>

        <!-- PÁGINA 3: FAMÍLIA -->
        <div id="familia" class="page">
            <h3 style="color:var(--amarelo); text-align:center;">Contato de Emergência</h3>
            <input type="text" id="nome-familia" placeholder="Nome do Parente">
            <input type="tel" id="tel-familia" placeholder="DDD + Número">
            <button onclick="salvarFamilia()" class="btn-base bg-verde" style="padding:15px;">💾 SALVAR</button>
            <div id="contato-salvo" style="margin-top:20px; display:none; text-align:center;">
                <button onclick="ligarFamilia()" class="btn-base bg-rosa" style="padding:20px;">📞 LIGAR AGORA</button>
            </div>
        </div>

        <!-- PÁGINA 4: MAPA -->
        <div id="mapa" class="page" style="padding:0; height:100%;">
            <iframe id="google-maps" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>

        <!-- PÁGINA 5: CÂMERA (SCANNER) -->
        <div id="camera" class="page">
                  <!-- CONTINUAÇÃO DA PÁGINA 3: FAMÍLIA -->
            <div id="contato-salvo" style="margin-top:20px; display:none; text-align:center;">
                <button onclick="ligarFamilia()" class="btn-base bg-rosa" style="padding:20px;">📞 LIGAR AGORA</button>
            </div>
        </div>

        <!-- PÁGINA 4: MAPA -->
        <div id="mapa" class="page" style="padding:0; height:100%;">
            <iframe id="google-maps" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>

        <!-- PÁGINA 5: CÂMERA (SCANNER) -->
        <div id="camera" class="page">
            <h3 style="text-align:center; color:var(--amarelo);">Identificador de Placas</h3>
            <div id="reader"></div>
            <div id="res-scan" style="display:none; margin-top:20px; background:#252525; padding:20px; border-radius:20px; border:1px solid var(--amarelo);">
                <h4 id="pl-nome" style="color:var(--amarelo); margin:0;"></h4>
                <p id="pl-desc" style="font-size:14px;"></p>
                <button class="btn-base bg-azul" onclick="restartScan()" style="padding:10px; margin-top:10px;">ESCANEAR OUTRA</button>
            </div>
        </div>
    </div>

    <!-- MENU INFERIOR -->
    <nav>
        <button onclick="showPage('home', this)" class="active-nav"><span class="nav-icon">🚨</span>Início</button>
        <button onclick="showPage('idoso', this)"><span class="nav-icon">👴</span>Idoso</button>
        <button onclick="showPage('familia', this)"><span class="nav-icon">❤️</span>Família</button>
        <button id="nav-mapa" onclick="showPage('mapa', this)"><span class="nav-icon">🗺️</span>Mapa</button>
        <button id="nav-camera" onclick="showPage('camera', this)"><span class="nav-icon">📷</span>Câmera</button>
    </nav>

    <script>
        let lat, lon, scanner;

        // PEGAR LOCALIZAÇÃO E CARREGAR MAPA
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                lat = p.coords.latitude; 
                lon = p.coords.longitude;
                document.getElementById('google-maps').src = `https://maps.google.com{lat},${lon}&t=&z=15&ie=UTF8&iwloc=&output=embed`;
            });
        }

        // NAVEGAÇÃO
        function showPage(pId, b) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pId).classList.add('active');
            document.querySelectorAll('nav button').forEach(n => n.classList.remove('active-nav'));
            b.classList.add('active-nav');
            if(pId === 'camera') startScan(); else stopScan();
        }

        // SALVAR FAMÍLIA
        function salvarFamilia() {
            const nome = document.getElementById('nome-familia').value;
            const tel = document.getElementById('tel-familia').value;
            if(nome && tel) {
                localStorage.setItem('ice_nome', nome);
                localStorage.setItem('ice_tel', tel);
                alert("✅ Contato Salvo!");
                document.getElementById('contato-salvo').style.display = 'block';
            }
        }

        function ligarFamilia() {
            const tel = localStorage.getItem('ice_tel');
            if(tel) window.location.href = `tel:${tel}`;
            else alert("Nenhum número salvo!");
        }

        function enviarZap() {
    let tel = localStorage.getItem('ice_tel');
    if(!tel) {
        alert("⚠️ Vá na aba 'Família' e salve um número primeiro!");
        showPage('familia', document.querySelector('nav button:nth-child(3)'));
        return;
    }
    
    // Remove parênteses, espaços e traços: (11) 99999-8888 -> 11999998888
    const numLimpo = tel.replace(/\D/g, '');
    
    // Se o usuário esqueceu o 55, a gente coloca
    const linkZap = numLimpo.startsWith('55') ? numLimpo : '55' + numLimpo;
    
    const msg = `🚨 *EMERGÊNCIA TRANSITAL!* \nPreciso de ajuda urgente.\nMinha localização: https://www.google.com{lat},${lon}`;
    
    window.open(`https://api.whatsapp.com{linkZap}&text=${encodeURIComponent(msg)}`, '_blank');
}

    }
    
    // Remove qualquer caractere que não seja número
    const numLimpo = tel.replace(/\D/g, '');
    const msg = `🚨 EMERGÊNCIA! Preciso de ajuda. Minha localização: https://www.google.com{lat},${lon}`;
    
    // Link que funciona melhor em ambos (Celular e PC)
    const url = `https://api.whatsapp.com{numLimpo}&text=${encodeURIComponent(msg)}`;
    
    window.open(url, '_blank');
}

        }

        // FUNÇÕES DA CÂMERA (MOCKUP)
                function startScan() {
            scanner = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            scanner.start({ facingMode: "environment" }, config, (txt) => {
                document.getElementById('res-scan').style.display = 'block';
                document.getElementById('pl-nome').innerText = "Placa / QR Detectado";
                document.getElementById('pl-desc').innerText = "Conteúdo: " + txt;
                stopScan();
            }).catch(err => console.error("Erro na câmera", err));
        }

        function stopScan() {
            if(scanner) {
                scanner.stop().then(() => {
                    document.getElementById('reader').innerHTML = "";
                }).catch(err => console.log("Erro ao parar", err));
            }
        }


        // CHECAR SE JÁ TEM CONTATO AO ABRIR
        window.onload = () => {
            if(localStorage.getItem('ice_tel')) document.getElementById('contato-salvo').style.display = 'block';
        };
    </script>
</body>
</html>
