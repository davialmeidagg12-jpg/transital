<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emergência Transital</title>
    <link rel="icon" href="icon.png" type="image/png">
    <script src="https://unpkg.com"></script>
    <style>
        :root { 
            --amarelo: #ffcc00; --vermelho: #ff4d4d; --verde: #2ecc71; --azul: #3498db;
            --fundo: #121212; --card: #1e1e1e; --texto: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); color: var(--texto); margin: 0; padding-bottom: 100px; overflow-x: hidden; }

        header { background: var(--amarelo); color: #000; padding: 15px; text-align: center; font-weight: 800; font-size: 18px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .page { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            padding: 18px 10px; border: none; border-radius: 18px; font-size: 16px; font-weight: 700; 
            color: white; text-decoration: none; margin-bottom: 12px; width: 100%;
            background: var(--card); box-shadow: 6px 6px 12px rgba(0,0,0,0.4); cursor: pointer;
            box-sizing: border-box; transition: 0.2s;
        }
        .btn:active { transform: scale(0.97); }
        .emergencia { background: linear-gradient(145deg, #ff4d4d, #d90429); }
        .estacionar { background: linear-gradient(145deg, var(--azul), #2980b9); }

        /* CARDS E INFOS */
        .card-info { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .placa-mini { width: 40px; margin-right: 10px; vertical-align: middle; }
        .status-vaga { color: var(--amarelo); font-weight: bold; font-size: 14px; margin-top: 10px; display: block; }

        /* MENU INFERIOR */
        nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: #1a1a1a; display: flex; justify-content: space-around; 
            padding: 10px 0; border-top: 1px solid #333; z-index: 1000;
        }
        nav button { background: none; border: none; color: #666; font-size: 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        nav button.active-nav { color: var(--amarelo); }
        .nav-icon { font-size: 24px; margin-bottom: 2px; }
    </style>
</head>
<body>

    <header>EMERGÊNCIA TRANSITAL</header>

    <!-- PÁGINA HOME -->
    <div id="home" class="page active">
        <a href="tel:191" class="btn emergencia"><span>📞</span> POLÍCIA (191)</a>
        <a href="tel:193" class="btn emergencia" style="background: #b91c1c;"><span>🚑</span> BOMBEIROS (193)</a>
        <button class="btn" style="background:#fff; color:#000;" onclick="toggleLanterna()" id="btn-lanterna"><span>🔦</span> SINALIZAR LOCAL</button>
    </div>

    <!-- PÁGINA ONDE ESTACIONEI (NOVA) -->
    <div id="carro" class="page">
        <h3 style="text-align:center; color:var(--amarelo);">Meu Carro</h3>
        
        <div class="card-info">
            <p style="margin-top:0;"><b>📍 Localização do Veículo</b></p>
            <button onclick="salvarVaga()" class="btn estacionar">💾 SALVAR LUGAR ATUAL</button>
            <button onclick="irParaVaga()" class="btn" style="background:#444;">🗺️ VER NO MAPA</button>
            <span id="status-vaga" class="status-vaga">Nenhum local salvo ainda.</span>
        </div>

        <div class="card-info">
            <p><b>⚠️ Posso estacionar aqui?</b></p>
            <div style="font-size: 13px; line-height: 1.6;">
                <img src="https://upload.wikimedia.org" class="placa-mini"> Proibido Estacionar<br>
                <img src="https://upload.wikimedia.org" class="placa-mini"> Proibido Parar e Estacionar<br>
                <img src="https://upload.wikimedia.org" class="placa-mini"> Estacionamento Regulamentado (Pode!)
            </div>
        </div>
    </div>

    <!-- PÁGINA SCANNER -->
    <div id="scan" class="page">
        <h3 style="text-align:center;">Scanner de Placas</h3>
        <div id="reader" style="width:100%; border-radius:15px; overflow:hidden;"></div>
    </div>

    <nav>
        <button onclick="showPage('home', this)" class="active-nav"><span class="nav-icon">🚨</span>Início</button>
        <button onclick="showPage('carro', this)"><span class="nav-icon">🚗</span>Meu Carro</button>
        <button onclick="showPage('scan', this)"><span class="nav-icon">📷</span>Scanner</button>
    </nav>

    <script>
        let latVaga, lonVaga;

        function salvarVaga() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    latVaga = p.coords.latitude;
                    lonVaga = p.coords.longitude;
                    localStorage.setItem('vaga_lat', latVaga);
                    localStorage.setItem('vaga_lon', lonVaga);
                    document.getElementById('status-vaga').innerText = "✅ Localização salva com sucesso!";
                    document.getElementById('status-vaga').style.color = "#2ecc71";
                });
            } else {
                alert("Ative o GPS para salvar o local.");
            }
        }

        function irParaVaga() {
            const savedLat = localStorage.getItem('vaga_lat');
            const savedLon = localStorage.getItem('vaga_lon');
            if (savedLat && savedLon) {
                window.open(`https://www.google.com{savedLat},${savedLon}`, '_blank');
            } else {
                alert("Você ainda não salvou nenhum local.");
            }
        }

        // Recupera vaga ao carregar página
        window.onload = () => {
            if(localStorage.getItem('vaga_lat')) {
                document.getElementById('status-vaga').innerText = "📍 Existe um local salvo no sistema.";
            }
        };

        function showPage(pId, b) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pId).classList.add('active');
            document.querySelectorAll('nav button').forEach(n => n.classList.remove('active-nav'));
            b.classList.add('active-nav');
            if(pId === 'scan') { startScan(); } else { stopScan(); }
        }

        let lInt, pisc = false;
        function toggleLanterna() {
            const b = document.getElementById('btn-lanterna');
            if (!pisc) {
                pisc = true; b.innerHTML = "<span>🛑</span> PARAR";
                lInt = setInterval(() => { document.body.style.background = document.body.style.background === 'red' ? 'white' : '#121212'; }, 300);
            } else {
                pisc = false; clearInterval(lInt); document.body.style.background = "#121212"; b.innerHTML = "<span>🔦</span> SINALIZAR LOCAL";
            }
        }

        let scanner;
        function startScan() {
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                alert("Placa: " + txt);
                scanner.stop();
            }).catch(e => console.log(e));
        }
        function stopScan() { if(scanner) scanner.stop().catch(e => console.log(e)); }
    </script>
</body>
</html>
