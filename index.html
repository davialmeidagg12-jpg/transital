<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emergência Transital PRO</title>
    <script src="https://unpkg.com"></script>

    <style>
        :root { 
            --amarelo: #ffcc00; --vermelho: #d90429; --verde: #2ecc71; 
            --fundo: #121212; --card: #1e1e1e; --texto: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--fundo); color: var(--texto); 
            margin: 0; padding-bottom: 90px; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }
        
        header { 
            background: var(--amarelo); color: #000; padding: 15px; 
            text-align: center; font-weight: 900; font-size: 18px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: sticky; top: 0; width: 100%; z-index: 1000;
        }

        .content { 
            padding: 15px; 
            width: 100%; 
            max-width: 500px; /* Impede que o app estique demais no PC */
            box-sizing: border-box;
        }

        .page { display: none; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* BOTÕES AJUSTADOS - TAMANHO EQUILIBRADO */
        .btn-base { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 8px; border: none; border-radius: 15px; font-weight: 800; color: white; 
            text-decoration: none; 
            min-height: 120px; /* Altura fixa para não esticar na vertical */
            padding: 10px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4); font-size: 13px; width: 100%;
            text-transform: uppercase; box-sizing: border-box;
        }

        .btn-base:active { transform: scale(0.96); }
        .btn-base span { font-size: 35px; } /* Ícone em tamanho ideal */

        /* Cores */
        .bg-vermelho { background: var(--vermelho); }
        .bg-verde { background: var(--verde); }
        .bg-roxo { background: #9b59b6; }
        .bg-rosa { background: #e91e63; }
        .bg-azul { background: #2980b9; }

        /* GRID CORRIGIDO */
        .grid-home { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-top: 10px;
        }

        /* MENU INFERIOR */
        nav { 
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background: #1a1a1a; display: flex; justify-content: space-around; 
            padding: 12px 0; border-top: 1px solid #333; z-index: 1000; 
        }
        nav button { 
            background: none; border: none; color: #777; font-size: 11px; 
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        nav button.active-nav { color: var(--amarelo); font-weight: bold; }
        .nav-icon { font-size: 22px; }

        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<header>🛡️ EMERGÊNCIA TRANSITAL PRO</header>

<div class="content">
    <div id="home" class="page active">
        <h3 style="text-align:center; color: var(--amarelo); font-size: 14px; margin-bottom: 15px;">PAINEL DE CONTROLE</h3>
        
        <div class="grid-home">
            <a href="tel:191" class="btn-base bg-vermelho"><span>🚨</span> POLÍCIA</a>
            <a href="tel:193" class="btn-base bg-vermelho" style="background:#b91c1c;"><span>🚑</span> BOMBEIROS</a>
            <button onclick="enviarZap()" class="btn-base bg-verde"><span>📍</span> ZAP LOCAL</button>
            <button onclick="showPage('camera', this)" class="btn-base bg-roxo"><span>📷</span> LER PLACA</button>
            
            <button onclick="showPage('mapa', this)" class="btn-base bg-azul" style="grid-column: span 2; min-height: 80px; flex-direction: row; gap: 15px;">
                <span>🗺️</span> <b>VER MAPA E TRÂNSITO</b>
            </button>
        </div>
    </div>

    <div id="idoso" class="page">
        <h3 style="text-align:center; color: var(--amarelo); margin-bottom: 15px;">MODO IDOSO</h3>
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <a href="tel:191" class="btn-base bg-vermelho" style="min-height: 140px;"><span>🚨</span> POLÍCIA</a>
            <button onclick="ligarFamilia()" class="btn-base bg-rosa" style="min-height: 140px;"><span>❤️</span> FAMÍLIA</button>
            <button onclick="enviarZap()" class="btn-base bg-verde" style="min-height: 140px;"><span>📍</span> MANDAR ZAP</button>
        </div>
    </div>

    <div id="familia" class="page">
        <h3 style="text-align:center; color: var(--amarelo);">CONTATO</h3>
        <input type="tel" id="tel-familia" placeholder="DDD + Número">
        <button onclick="salvarFamilia()" class="btn-base bg-verde" style="min-height: 60px;">💾 SALVAR</button>
    </div>

    <div id="mapa" class="page" style="height: 60vh;">
        <iframe id="google-maps" width="100%" height="100%" style="border:0; border-radius: 15px;"></iframe>
    </div>

    <div id="camera" class="page">
        <h3 style="text-align:center; color: var(--amarelo);">LER PLACA</h3>
        <div id="reader"></div>
    </div>
</div>

<nav>
    <button onclick="showPage('home', this)" class="active-nav"><span class="nav-icon">🚨</span>Início</button>
    <button onclick="showPage('idoso', this)"><span class="nav-icon">👴</span>Idoso</button>
    <button onclick="showPage('familia', this)"><span class="nav-icon">❤️</span>Família</button>
    <button onclick="showPage('mapa', this)"><span class="nav-icon">🗺️</span>Mapa</button>
    <button onclick="showPage('camera', this)"><span class="nav-icon">📷</span>Câmera</button>
</nav>

<script>
    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        document.getElementById(pageId).classList.add('active');
        if(btn) btn.classList.add('active-nav');
        if(pageId === 'mapa') carregarMapa();
    }

    function salvarFamilia() {
        const num = document.getElementById('tel-familia').value;
        if(num) { localStorage.setItem('telFamilia', num); alert('Salvo!'); }
    }

    function ligarFamilia() {
        const num = localStorage.getItem('telFamilia');
        if(num) window.location.href = "tel:" + num;
        else alert('Configure o número primeiro!');
    }

    function enviarZap() { window.open("https://wa.me!", "_blank"); }

    function carregarMapa() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                document.getElementById('google-maps').src = `https://maps.google.com{p.coords.latitude},${p.coords.longitude}&z=15&output=embed`;
            });
        }
    }
</script>
</body>
</html>
