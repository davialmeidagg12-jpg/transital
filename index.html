<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emergência Transital PRO</title>
    <script src="https://unpkg.com"></script>

    <style>
        :root { 
            --amarelo: #ffcc00; --vermelho: #d90429; --verde: #2ecc71; 
            --fundo: #121212; --card: #1e1e1e; --texto: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); color: var(--texto); margin: 0; padding-bottom: 100px; display: flex; flex-direction: column; align-items: center; }
        header { background: var(--amarelo); color: #000; padding: 15px; text-align: center; font-weight: 900; width: 100%; position: sticky; top: 0; z-index: 1000; }
        .content { padding: 15px; width: 100%; max-width: 500px; box-sizing: border-box; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-base { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 8px; border: none; border-radius: 15px; font-weight: 800; color: white; 
            min-height: 110px; padding: 10px; cursor: pointer; width: 100%; text-transform: uppercase; font-size: 11px;
        }
        .bg-vermelho { background: var(--vermelho); }
        .bg-verde { background: var(--verde); }
        .bg-roxo { background: #9b59b6; }
        .bg-azul { background: #2980b9; }
        .bg-rosa { background: #e91e63; }
        .btn-base span { font-size: 35px; }

        /* QUIZ */
        .quiz-container { background: #1e1e1e; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        .quiz-placa { font-size: 80px; margin: 15px 0; display: block; }
        .opcao-btn { width: 100%; padding: 15px; margin: 8px 0; border-radius: 10px; border: 2px solid #333; background: #252525; color: white; font-weight: bold; }
        .correto { background: var(--verde) !important; }
        .errado { background: var(--vermelho) !important; }

        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #1a1a1a; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        nav button { background: none; border: none; color: #777; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        nav button.active-nav { color: var(--amarelo); font-weight: bold; }
        .nav-icon { font-size: 20px; }

        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<header>🛡️ EMERGÊNCIA TRANSITAL PRO</header>

<div class="content">
    
    <!-- 1. INÍCIO -->
    <div id="home" class="page active">
        <div style="background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 20px; border-left: 5px solid var(--amarelo);">
            <h3 style="margin:0; font-size: 14px; color: var(--amarelo);">PAINEL DE CONTROLE</h3>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <a href="tel:191" class="btn-base bg-vermelho"><span>🚨</span> POLÍCIA</a>
            <a href="tel:193" class="btn-base bg-vermelho" style="background:#b91c1c;"><span>🚑</span> BOMBEIROS</a>
            <button onclick="enviarZap()" class="btn-base bg-verde"><span>📍</span> ZAP LOCAL</button>
            <button onclick="showPage('camera', document.getElementById('nav-camera'))" class="btn-base bg-roxo"><span>📷</span> SCANNER</button>
            <button onclick="showPage('mapa', document.getElementById('nav-mapa'))" class="btn-base bg-azul" style="grid-column: span 2; min-height: 80px; flex-direction: row; gap: 15px;">
                <span>🗺️</span> <b>VER MAPA</b>
            </button>
        </div>
    </div>

    <!-- 2. IDOSO -->
    <div id="idoso" class="page">
        <div style="text-align: center; margin-bottom: 20px;"><span style="font-size: 40px;">👴</span><h2 style="color: var(--amarelo);">Modo Auxílio</h2></div>
        <a href="tel:191" class="btn-base bg-vermelho" style="min-height: 140px; font-size: 18px; margin-bottom:15px; border: 3px solid white;"><span>🚨</span> LIGAR POLÍCIA</a>
        <button onclick="ligarFamilia()" class="btn-base bg-rosa" style="min-height: 140px; font-size: 18px;"><span>❤️</span> CHAMAR FAMÍLIA</button>
        <div style="background: #1e1e1e; padding: 15px; border-radius: 15px; margin-top: 20px;">
            <p style="font-size: 12px; color: var(--amarelo);">Configurar Número da Família:</p>
            <input type="tel" id="tel-familia" placeholder="Ex: 11999998888">
            <button onclick="salvarFamilia()" style="width: 100%; padding: 10px; background: var(--verde); border: none; color: white; font-weight: bold; border-radius: 8px;">SALVAR</button>
        </div>
    </div>

    <!-- 3. SIMULADO -->
    <div id="quiz" class="page">
        <h3 style="text-align:center; color: var(--amarelo);">SIMULADO CNH</h3>
        <div class="quiz-container">
            <span id="placa-img" class="quiz-placa">🛑</span>
            <p id="pergunta-texto" style="font-weight: bold;">O que significa esta placa?</p>
            <div id="opcoes"></div>
            <p id="quiz-status" style="margin-top:10px; font-size:12px; color: #888;"></p>
        </div>
    </div>

    <!-- 4. CÂMERA -->
    <div id="camera" class="page">
        <h3 style="text-align:center; color: var(--amarelo);">SCANNER DE PLACA</h3>
        <div id="reader" style="width: 100%; border-radius: 15px; overflow: hidden; background:#000;"></div>
        <p style="font-size: 12px; text-align: center; color: #888; margin-top: 10px;">Aponte para a placa para detectar.</p>
    </div>

    <!-- 5. MAPA -->
    <div id="mapa" class="page" style="height: 60vh;">
        <iframe id="google-maps" width="100%" height="100%" style="border:0; border-radius: 20px;"></iframe>
    </div>
</div>

<nav>
    <button onclick="showPage('home', this)" class="active-nav"><span class="nav-icon">🚨</span>Início</button>
    <button onclick="showPage('idoso', this)"><span class="nav-icon">👴</span>Idoso</button>
    <button id="nav-quiz" onclick="showPage('quiz', this)"><span class="nav-icon">📝</span>Simulado</button>
    <button id="nav-camera" onclick="showPage('camera', this)"><span class="nav-icon">📷</span>Câmera</button>
    <button id="nav-mapa" onclick="showPage('mapa', this)"><span class="nav-icon">🗺️</span>Mapa</button>
</nav>

<script>
    let html5QrCode = null;

    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        document.getElementById(pageId).classList.add('active');
        if(btn) btn.classList.add('active-nav');
        
        // Parar câmera ao sair
        if(pageId !== 'camera' && html5QrCode) {
            html5QrCode.stop().catch(() => {});
        }

        if(pageId === 'quiz') iniciarQuiz();
        if(pageId === 'camera') iniciarCamera();
        if(pageId === 'mapa') carregarMapa();
    }

    function iniciarCamera() {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
            alert("Placa Detectada: " + decodedText);
        }).catch(err => { console.error("Erro na câmera: ", err); });
    }

    // BANCO DE DADOS QUIZ
    const bancoPlacas = [
        { p: "🛑", c: "Parada Obrigatória", o: ["Pare", "Parada Obrigatória", "Atenção"] },
        { p: "🚫", c: "Sentido Proibido", o: ["Sentido Proibido", "Pare", "Não Entre"] },
        { p: "🅿️", c: "Estacionamento", o: ["Pare", "Estacionamento", "Pátio"] },
        { p: "🚸", c: "Área Escolar", o: ["Crianças", "Área Escolar", "Parque"] },
        { p: "🚴", c: "Ciclistas", o: ["Ciclistas", "Proibido Bicicleta", "Ciclovia"] },
        { p: "⛽", c: "Posto", o: ["Posto", "Mecânico", "Comida"] }
    ];
    let qAtual = 0;

    function iniciarQuiz() {
        const item = bancoPlacas[qAtual];
        document.getElementById('placa-img').innerText = item.p;
        const opts = document.getElementById('opcoes');
        opts.innerHTML = "";
        item.o.forEach(opt => {
            const b = document.createElement('button');
            b.className = "opcao-btn";
            b.innerText = opt;
            b.onclick = () => {
                if(opt === item.c) b.classList.add('correto');
                else b.classList.add('errado');
                setTimeout(() => { qAtual = (qAtual + 1) % bancoPlacas.length; iniciarQuiz(); }, 1000);
            };
            opts.appendChild(b);
        });
        document.getElementById('quiz-status').innerText = `Pergunta ${qAtual + 1} de ${bancoPlacas.length}`;
    }

    function salvarFamilia() { localStorage.setItem('telFamilia', document.getElementById('tel-familia').value); alert('Salvo!'); }
    function ligarFamilia() { const n = localStorage.getItem('telFamilia'); if(n) window.location.href="tel:"+n; else alert('Configure o número!'); }
    function enviarZap() { window.open("https://wa.me🚨 Ajuda!", "_blank"); }
    function carregarMapa() { if (navigator.geolocation) { navigator.geolocation.getCurrentPosition(p => { document.getElementById('google-maps').src = `https://maps.google.com{p.coords.latitude},${p.coords.longitude}&z=15&output=embed`; }); } }
</script>
</body>
</html>
