<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emergência Transital PRO</title>
    <script src="https://unpkg.com"></script>

    <style>
        :root { 
            --amarelo: #ffcc00; --vermelho: #d90429; --verde: #2ecc71; 
            --fundo: #121212; --card: #1e1e1e; --texto: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); color: var(--texto); margin: 0; padding-bottom: 80px; }
        header { background: var(--amarelo); color: #000; padding: 15px; text-align: center; font-weight: 900; position: sticky; top: 0; z-index: 1000; }
        .content { padding: 15px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-base { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 8px; border: none; border-radius: 15px; font-weight: 700; color: white; 
            padding: 20px 10px; cursor: pointer; transition: 0.2s; width: 100%; font-size: 13px;
        }
        .bg-vermelho { background: var(--vermelho); }
        .bg-verde { background: var(--verde); }
        .bg-roxo { background: #9b59b6; }
        .bg-rosa { background: #e91e63; }
        .btn-base span { font-size: 28px; }

        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        nav button { background: none; border: none; color: #777; font-size: 11px; display: flex; flex-direction: column; align-items: center; }
        nav button.active-nav { color: var(--amarelo); }
    </style>
</head>
<body>
<!-- ... (mantenha seu <head> e <style> igual) ... -->
<body>
<header>🛡️ EMERGÊNCIA TRANSITAL PRO</header>

<div class="content">
    <!-- PÁGINA 1: INÍCIO -->
    <div id="home" class="page active">
        <h3 style="text-align:center; color: var(--amarelo);">PAINEL DE CONTROLE</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <a href="tel:191" class="btn-base bg-vermelho"><span>🚨</span> POLÍCIA</a>
            <a href="tel:193" class="btn-base bg-vermelho" style="background:#b91c1c;"><span>🚑</span> BOMBEIROS</a>
            <button onclick="enviarZap()" class="btn-base bg-verde"><span>📍</span> MANDAR ZAP</button>
            <button onclick="showPage('camera', this)" class="btn-base bg-roxo"><span>📷</span> LER PLACA</button>
            <button onclick="showPage('mapa', this)" class="btn-base" style="grid-column: span 2; background: #2980b9; flex-direction: row; gap: 15px;">
                <span>🗺️</span> <b>VER MAPA</b>
            </button>
        </div>
    </div>

    <!-- PÁGINA 2: IDOSO -->
    <div id="idoso" class="page">
        <h3 style="text-align:center; color: var(--amarelo);">MODO IDOSO</h3>
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <button onclick="ligarFamilia()" class="btn-base bg-rosa"><span>❤️</span> FAMÍLIA</button>
            <button onclick="enviarZap()" class="btn-base bg-verde"><span>📍</span> MANDAR ZAP</button>
        </div>
    </div>

    <!-- PÁGINA 3: FAMÍLIA -->
    <div id="familia" class="page">
        <h3 style="text-align:center; color: var(--amarelo);">CONTATO</h3>
        <input type="tel" id="tel-familia" placeholder="DDD + Número">
        <button onclick="salvarFamilia()" class="btn-base bg-verde">💾 SALVAR</button>
    </div>

    <!-- PÁGINA 4: MAPA -->
    <div id="mapa" class="page" style="height: 400px;">
        <iframe id="google-maps" width="100%" height="100%" style="border:0;"></iframe>
    </div>

    <!-- PÁGINA 5: CÂMERA -->
    <div id="camera" class="page">
        <h3 style="text-align:center;">SCANNER</h3>
        <div id="reader"></div>
    </div>
</div>

<nav>
    <button onclick="showPage('home', this)" class="active-nav"><span>🚨</span>Início</button>
    <button onclick="showPage('idoso', this)"><span>👴</span>Idoso</button>
    <button onclick="showPage('familia', this)"><span>❤️</span>Família</button>
    <button onclick="showPage('mapa', this)"><span>🗺️</span>Mapa</button>
    <button onclick="showPage('camera', this)"><span>📷</span>Câmera</button>
</nav>

<script>
    function showPage(pageId, btn) {
        // Esconde todas as páginas e remove destaque do menu
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        
        // Mostra a página selecionada e destaca o botão
        document.getElementById(pageId).classList.add('active');
        if(btn) btn.classList.add('active-nav');
    }

    function salvarFamilia() {
        const num = document.getElementById('tel-familia').value;
        localStorage.setItem('telFamilia', num);
        alert('Número salvo!');
    }

    function ligarFamilia() {
        const num = localStorage.getItem('telFamilia');
        if(num) window.location.href = "tel:" + num;
        else alert('Salve um número primeiro!');
    }

    function enviarZap() {
        window.open("https://wa.me de ajuda!", "_blank");
    }
</script>
</body>

</body>
</html>
