<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emergência Transital PRO</title>
    <style>
        :root { 
            --amarelo: #ffcc00; --vermelho: #ff4d4d; --verde: #2ecc71; 
            --fundo: #121212; --card: #1e1e1e; --texto: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); color: var(--texto); margin: 0; padding-bottom: 100px; overflow: hidden; height: 100vh; }
        
        header { background: var(--amarelo); color: #000; padding: 15px; text-align: center; font-weight: 900; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000; position: relative; }

        .content { height: calc(100vh - 140px); overflow-y: auto; }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; box-sizing: border-box; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* PADRONIZAÇÃO DE BOTÕES - TODAS AS BORDAS IGUAIS */
        .btn { 
            display: flex; align-items: center; justify-content: center; gap: 12px; 
            padding: 20px; border: none; border-radius: 20px; font-size: 16px; font-weight: 700; 
            color: white; text-decoration: none; margin-bottom: 15px; width: 100%;
            background: var(--card); box-shadow: 0 6px 12px rgba(0,0,0,0.4); 
            cursor: pointer; box-sizing: border-box; transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        
        /* CORES PADRONIZADAS SEM BORDAS EXTRAS */
        .emergencia { background: #d90429; }
        .zap { background: #25d366; }
        .btn-idoso { padding: 40px; font-size: 24px; background: #3498db; }

        /* FORMULÁRIO */
        input, textarea, select { 
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; 
            border: 1px solid #333; background: #252525; color: white; box-sizing: border-box;
        }

        /* MENU INFERIOR */
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        nav button { background: none; border: none; color: #666; font-size: 10px; display: flex; flex-direction: column; align-items: center; }
        nav button.active-nav { color: var(--amarelo); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header>EMERGÊNCIA TRANSITAL PRO</header>

    <div class="content">
        <!-- PÁGINA 1: INÍCIO -->
        <div id="home" class="page active">
            <h3 style="text-align:center;">Socorro Rápido</h3>
            <a href="tel:191" class="btn emergencia">🚨 LIGAR POLÍCIA (191)</a>
            <a href="tel:193" class="btn emergencia" style="background: #b91c1c;">🚑 BOMBEIROS (193)</a>
            <button onclick="enviarZap()" class="btn zap">📍 LOCALIZAÇÃO (ZAP)</button>
        </div>

        <!-- PÁGINA 2: MODO IDOSO (BOTÕES GIGANTES) -->
        <div id="idoso" class="page">
            <h2 style="text-align:center; color:var(--amarelo);">Modo Acessível</h2>
            <a href="tel:191" class="btn btn-idoso emergencia">📞 POLÍCIA</a>
            <a href="tel:193" class="btn btn-idoso" style="background:#b91c1c;">🚑 BOMBEIROS</a>
            <button onclick="enviarZap()" class="btn btn-idoso zap">🟢 ENVIAR ZAP</button>
        </div>

        <!-- PÁGINA 3: MAPA -->
        <div id="mapa" class="page" style="padding:0; height:100%;">
            <iframe id="google-maps" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>

        <!-- PÁGINA 4: REPORTAR (FORMULÁRIO) -->
        <div id="reportar" class="page">
            <h3 style="color:var(--amarelo);">Relatar Problema</h3>
            <p style="font-size:12px;">Sua informação ajuda outros motoristas.</p>
            <select id="tipo-alerta">
                <option value="Acidente">⚠️ Acidente</option>
                <option value="Obras">🚧 Obras na Pista</option>
                <option value="Animal">🐾 Animal na Via</option>
            </select>
            <textarea id="desc-alerta" placeholder="Descreva o que aconteceu..."></textarea>
            <button onclick="enviarAlerta()" class="btn zap">ENVIAR ALERTA</button>
        </div>
    </div>

    <nav>
        <button onclick="showPage('home', this)" class="active-nav"><span class="nav-icon">🚨</span>Início</button>
        <button onclick="showPage('idoso', this)"><span class="nav-icon">👴</span>Idoso</button>
        <button onclick="showPage('mapa', this)"><span class="nav-icon">🗺️</span>Mapa</button>
        <button onclick="showPage('reportar', this)"><span class="nav-icon">📢</span>Alertar</button>
    </nav>

    <script>
        let lat, lon;
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                lat = p.coords.latitude; lon = p.coords.longitude;
                document.getElementById('google-maps').src = `https://www.google.com{lat},${lon}&z=15&output=embed`;
            });
        }

        function showPage(pId, b) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pId).classList.add('active');
            document.querySelectorAll('nav button').forEach(n => n.classList.remove('active-nav'));
            b.classList.add('active-nav');
        }

        function enviarZap() {
            if(lat) window.location.href = `https://wa.me! Minha localização: https://www.google.com{lat},${lon}`;
            else alert("Aguarde o GPS...");
        }

        function enviarAlerta() {
            const tipo = document.getElementById('tipo-alerta').value;
            const desc = document.getElementById('desc-alerta').value;
            alert(`Alerta de ${tipo} enviado com sucesso! Obrigado por colaborar.`);
            document.getElementById('desc-alerta').value = "";
        }
    </script>
</body>
</html>
